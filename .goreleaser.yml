version: 2

project_name: kuality

builds:
  - id: kuality
    binary: kuality
    main: ./main.go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/kuality-io/cli/cmd.Version={{.Version}}
      - -X github.com/kuality-io/cli/cmd.Commit={{.Commit}}
      - -X github.com/kuality-io/cli/cmd.Date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

homebrew_casks:
  - name: kuality
    binaries:
      - kuality
    homepage: "https://kuality.io"
    description: "Scan any website for accessibility, performance, SEO, cross-browser, and 30+ QA dimensions"
    directory: Casks
    repository:
      owner: kuality-io
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"

release:
  github:
    owner: kuality-io
    name: cli
